name: website-versions-upload

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/website/**'
      - '.github/workflows/website-versions-upload.yaml'

permissions:
  pull-requests: write

env:
  VITE_WORKERS_ENV: "preview"

jobs:
  upload-website:
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.upload.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci

      - name: Generate Atom feed
        run: vp run --filter "@taga3s-dev/website" generate:atom

      - name: Build
        run: vp run build:website

      - name: Upload to Cloudflare Workers
        id: upload
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --config wrangler.jsonc
          workingDirectory: ./packages/website
        env:
          POLICY_AUD: ${{ secrets.CLOUDFLARE_ACCESS_AUD }}
          TEAM_DOMAIN: ${{ secrets.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}

  comment-preview-url:
    needs: upload-website
    uses: ./.github/workflows/comment-preview-url.yaml
    with:
      name: "@taga3s-dev/website"
      target_url: ${{ needs.upload-website.outputs.deployment-url }}
      pr_number: ${{ github.event.number }}
