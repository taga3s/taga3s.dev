name: deploy

on:
  push:
    branches:
      - main
    paths:
      - 'packages/website/**'
      - 'packages/assets-converter/**'
      - 'packages/mdx-processor/**'
      - '.github/workflows/deploy.yaml'

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      website-changed: ${{ steps.changes.outputs.website }}
      assets-converter-changed: ${{ steps.changes.outputs.assets-converter }}
      mdx-processor-changed: ${{ steps.changes.outputs.mdx-processor }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            workflows: &workflows
              - '.github/workflows/deploy.yaml'
            blog-assets: &blog-assets
              - 'assets/blog/**'
            mdx-processor:
              - *workflows
              - *blog-assets
              - 'packages/mdx-processor/**'
            website:
              - *workflows
              - *blog-assets
              - 'packages/website/**'
            assets-converter:
              - *workflows
              - 'packages/assets-converter/**'

  run-mdx-processor:
    needs: [changes]
    if : ${{ needs.changes.outputs.mdx-processor-changed == 'true' }}
    uses: ./.github/workflows/reusable_run-mdx-processor.yaml
    secrets: inherit

  deploy-website:
    needs: [run-mdx-processor]
    runs-on: ubuntu-latest
    if : >- 
      ${{ 
        !cancelled() &&
        !failure() &&
        needs.changes.outputs.website-changed == 'true' 
      }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/website"

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: atom.xml
          path: ${{ github.workspace }}/packages/website/public

      - name: Publish to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --minify --config wrangler.jsonc
          workingDirectory: ./packages/website
        env:
          POLICY_AUD: ${{ secrets.CLOUDFLARE_ACCESS_AUD }}
          TEAM_DOMAIN: ${{ secrets.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}

  deploy-assets-converter:
    needs: [changes]
    if : ${{ needs.changes.outputs.assets-converter-changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/assets-converter"

      - name: Publish to Cloudflare Workers
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --minify --config wrangler.jsonc
          workingDirectory: ./packages/assets-converter
