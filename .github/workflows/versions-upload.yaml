name: versions-upload

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/website/**'
      - 'packages/images-worker/**'
      - 'packages/mdx-processor/**'
      - '.github/workflows/versions-upload.yaml'

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      website-changed: ${{ steps.changes.outputs.website }}
      images-worker-changed: ${{ steps.changes.outputs.images-worker }}
      mdx-processor-changed: ${{ steps.changes.outputs.mdx-processor }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            workflows: &workflows
              - '.github/workflows/versions-upload.yaml'
            blog-assets: &blog-assets
              - 'assets/blog/**'
            mdx-processor:
              - *workflows
              - *blog-assets
              - 'packages/mdx-processor/**'
            website:
              - *workflows
              - *blog-assets
              - 'packages/website/**'
            images-worker:
              - *workflows
              - 'packages/images-worker/**'
  
  run-mdx-processor:
    needs: [changes]
    runs-on: ubuntu-latest
    if : ${{ needs.changes.outputs.mdx-processor-changed == 'true' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/mdx-processor"

      - name: Generate blog data from assets
        env:
          PATHDIR: ${{ github.workspace }}/assets/blog
        run: |
          mkdir -p /tmp/blog
          vp run --filter "@taga3s-dev/mdx-processor" exec run --pathdir="$PATHDIR" --outdir=/tmp/blog
      
      - name: Upload blog data to Cloudflare R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          CLOUDFLARE_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          vp run --filter "@taga3s-dev/mdx-processor" exec upload --pathdir="/tmp/blog"

      - name: Generate Atom feed
        env:
          PATHDIR: ${{ github.workspace }}/assets/blog
        run: |
          mkdir -p /tmp/atom
          vp run --filter "@taga3s-dev/mdx-processor" exec genatom --pathdir="$PATHDIR" --outdir=/tmp/atom
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: /tmp/atom/atom.xml
          archive: false

  upload-website:
    needs: [run-mdx-processor]
    runs-on: ubuntu-latest
    if : ${{ needs.changes.outputs.website-changed == 'true' }}
    outputs:
      deployment-url: ${{ steps.upload.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/website"

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: atom.xml
          path: ${{ github.workspace }}/packages/website/public

      - name: Upload to Cloudflare Workers
        id: upload
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --config wrangler.jsonc
          workingDirectory: ./packages/website
        env:
          WORKERS_ENV: preview
          POLICY_AUD: ${{ secrets.CLOUDFLARE_ACCESS_AUD }}
          TEAM_DOMAIN: ${{ secrets.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}

  upload-images-worker:
    needs: [changes]
    runs-on: ubuntu-latest
    if : ${{ needs.changes.outputs.images-worker-changed == 'true' }}
    outputs:
      deployment-url: ${{ steps.upload.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/images-worker"

      - name: Upload to Cloudflare Workers
        id: upload
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --config wrangler.jsonc
          workingDirectory: ./packages/images-worker
  
  comment-preview-urls:
    needs: [upload-website, upload-images-worker]
    runs-on: ubuntu-latest
    if : ${{ needs.upload-website.outputs.deployment-url != '' || needs.upload-images-worker.outputs.deployment-url != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Comment preview URLs
        uses: ./.github/actions/comment-preview-url
        with:
          website_deployment_url: ${{ needs.upload-website.outputs.deployment-url }}
          images_worker_deployment_url: ${{ needs.upload-images-worker.outputs.deployment-url }}
          pr_number: ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
