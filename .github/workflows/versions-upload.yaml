name: versions-upload

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/website/**'
      - 'packages/assets-converter/**'
      - 'packages/mdx-processor/**'
      - '.github/workflows/versions-upload.yaml'

jobs:
  changes:
    runs-on: ubuntu-slim
    outputs:
      website-changed: ${{ steps.changes.outputs.website }}
      assets-converter-changed: ${{ steps.changes.outputs.assets-converter }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            workflows: &workflows
              - '.github/workflows/versions-upload.yaml'
            blog-assets: &blog-assets
              - 'assets/blog/**'
            mdx-processor: &mdx-processor
              - 'packages/mdx-processor/**'
            website:
              - *workflows
              - *blog-assets
              - *mdx-processor
              - 'packages/website/**'
            assets-converter:
              - *workflows
              - 'packages/assets-converter/**'
  
  run-mdx-processor:
    needs: [changes]
    if : needs.changes.outputs.website-changed
    uses: ./.github/workflows/reusable_run-mdx-processor.yaml
    with:
      is_preview: true
    secrets: inherit

  upload-website:
    needs: [run-mdx-processor]
    runs-on: ubuntu-latest
    if : needs.changes.outputs.website-changed
    outputs:
      deployment-url: ${{ steps.upload.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/website"

      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: atom.xml
          path: ${{ github.workspace }}/packages/website/public

      - name: Upload to Cloudflare Workers
        id: upload
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --config wrangler.jsonc
          workingDirectory: ./packages/website
        env:
          POLICY_AUD: ${{ secrets.CLOUDFLARE_ACCESS_AUD }}
          TEAM_DOMAIN: ${{ secrets.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}

  upload-assets-converter:
    needs: [changes]
    runs-on: ubuntu-latest
    if : needs.changes.outputs.assets-converter-changed
    outputs:
      deployment-url: ${{ steps.upload.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-ci
        with:
          install-packages: "@taga3s-dev/assets-converter"

      - name: Upload to Cloudflare Workers
        id: upload
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --config wrangler.jsonc
          workingDirectory: ./packages/assets-converter
  
  comment-preview-urls:
    needs: [upload-website, upload-assets-converter]
    runs-on: ubuntu-latest
    if : >- 
      ${{ 
        !cancelled() && 
        !failure() &&
        (needs.upload-website.outputs.deployment-url != '' ||
        needs.upload-assets-converter.outputs.deployment-url != '')
      }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Comment preview URLs
        uses: ./.github/actions/comment-preview-url
        with:
          website_deployment_url: ${{ needs.upload-website.outputs.deployment-url }}
          images_worker_deployment_url: ${{ needs.upload-assets-converter.outputs.deployment-url }}
          pr_number: ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
