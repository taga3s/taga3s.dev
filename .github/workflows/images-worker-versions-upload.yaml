name: images-worker-versions-upload

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/images-worker/**'
      - '.github/workflows/images-worker-versions-upload.yaml'

permissions:
  pull-requests: write

jobs:
  upload-images-worker:
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.upload.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/setup-ci

      - name: Upload to Cloudflare Workers
        id: upload
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload --config wrangler.jsonc
          workingDirectory: ./packages/images-worker
        env:
          BASIC_AUTH_USERNAME: ${{ secrets.IMAGES_WORKER_BASIC_AUTH_USERNAME }}
          BASIC_AUTH_PASSWORD: ${{ secrets.IMAGES_WORKER_BASIC_AUTH_PASSWORD }}

  comment-preview-url:
    needs: upload-images-worker
    uses: ./.github/workflows/comment-preview-url.yaml
    with:
      name: "@taga3s-dev/images-worker"
      target_url: ${{ needs.upload-images-worker.outputs.deployment-url }}
      pr_number: ${{ github.event.number }}
