  '@cloudflare/workers-types': ^5.20260711.1
  '@mdx-js/mdx': ^3.1.1
  '@mermaid-js/mermaid-cli': ^11.4.2
  '@resvg/resvg-js': ^2.6.2
  '@resvg/resvg-wasm': ^2.6.2
  '@shikijs/langs': ^4.0.0
  '@shikijs/rehype': ^4.0.0
  '@shikijs/themes': ^4.0.0
  '@swc-node/register': ^1.10.10
  '@swc/cli': ^0.8.0
  '@swc/core': ^1.11.24
  '@taga3s/atom-feed-composer': npm:@jsr/taga3s__atom-feed-composer@^0.1.1
  '@taga3s/rss-generator': npm:@jsr/taga3s__rss-generator@^0.2.1
  '@types/hast': ^3.0.4
  '@types/mdast': ^4.0.4
  '@types/node': ^24.12.2
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@types/unist': ^3.0.3
  gunshi: ^0.37.0
  hast-util-to-html: ^9.0.5
  hono: ^4.12.10
  jose: ^6.2.2
  puppeteer: ^25.0.0
  react: ^19.2.7
  react-dom: ^19.2.7
  rehype-parse: ^9.0.1
  rehype-stringify: ^10.0.1
  remark-breaks: ^4.0.0
  remark-extract-frontmatter: ^3.2.0
  remark-frontmatter: ^5.0.0
  remark-gfm: ^4.0.1
  remark-mdx-frontmatter: ^5.1.0
  remark-parse: ^11.0.0
  remark-rehype: ^11.1.2
  remark-stringify: ^11.0.0
  satori: ^0.25.0
  sharp: ^0.35.0
  shiki: ^4.0.0
  unified: ^11.0.5
  unist-util-visit: ^5.0.0
  vite-plus: ^0.2.4
  wrangler: ^4.110.0
  yoga-wasm-web: ^0.3.3
minimumReleaseAge: 1
minimumReleaseAgeExclude:
  - vite-plus
  - '@voidzero-dev/*'
  - oxlint
  - '@oxlint/*'
  - oxlint-tsgolint
  - '@oxlint-tsgolint/*'
  - oxfmt
  - '@oxfmt/*'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'

trustPolicy: no-downgrade
